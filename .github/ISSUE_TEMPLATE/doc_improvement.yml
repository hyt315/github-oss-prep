name: Documentation Improvement
description: Suggest improvements to documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the documentation!
  - type: dropdown
    id: doc-type
    attributes:
      label: Document type
      options:
        - SKILL.md
        - README.md
        - Reference file (references/)
        - Other
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: Which file and section needs improvement?
      placeholder: "e.g., SKILL.md line 120, Step 3"
  - type: textarea
    id: issue
    attributes:
      label: What's the issue?
      description: Is it unclear, outdated, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How would you improve it?
